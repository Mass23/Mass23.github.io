<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Detail</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="images/me.webp" sizes="48x48" />
  <style>
    body {
      background: #252626;
    }

    .content {
      background: linear-gradient(to bottom, #263DBF, #252626 14%);
      min-height: calc(100vh - 80px);
      align-items: flex-start;
    }

    .project-detail {
      width: min(1120px, 100%);
      margin: 0 auto;
      background: linear-gradient(to bottom, #F24C27, #e0e0e0 2%);
      border-radius: 10px;
      padding: 28px;
      color: #252626;
      font-family: "Andale Mono", Menlo, monospace;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #263DBF;
      text-decoration: none;
      font-weight: bold;
      font-style: italic;
      font-family: Arial, sans-serif;
    }

    .back-link:hover {
      color: #F24C27;
      text-decoration: underline;
    }

    .project-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.75fr) minmax(260px, 0.95fr);
      gap: 24px;
      align-items: start;
    }

    .project-main {
      min-width: 0;
    }

    .project-title {
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-style: italic;
      font-size: 24px;
      line-height: 1.3;
      margin: 0;
      color: #252626;
    }

    .project-full-description {
      font-size: 15px;
      line-height: 1.7;
      margin-top: 24px;
      margin-bottom: 0;
      white-space: pre-line;
    }

    .image-gallery {
      margin-top: 24px;
    }

        .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .gallery-grid figure {
      margin: 0;
      background: #d0d6db;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(37, 38, 38, 0.2);
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
      transform-origin: center;
    }
        
    .gallery-grid .gallery-media-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
    }
    
    .gallery-grid .gallery-media-frame img {
  transition: transform 0.25s ease;
}

.gallery-grid figure:not(.is-active) .gallery-media-frame:hover img {
  transform: scale(1.05);
}

/* optional: subtle darkening overlay with a zoom icon on hover */
.gallery-grid .gallery-media-frame::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0);
  transition: background 0.25s ease;
  pointer-events: none;
}

.gallery-grid figure:not(.is-active) .gallery-media-frame:hover::after {
  background: rgba(0, 0, 0, 0.15);
}
    
    .gallery-grid img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.25s ease;
    }
    
    .gallery-grid .gallery-media-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    
    /* hide the normal caption in the grid, show it attached to the popup on hover */
    .gallery-grid figcaption {
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #252626;
    }
    
    .lightbox-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, background-color 0.25s ease;
  z-index: 999;
}

.lightbox-backdrop.is-active {
  background: rgba(0, 0, 0, 0.8);
  opacity: 1;
  pointer-events: auto;
}

.gallery-grid figure.is-active {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: grid;
  grid-template-columns: auto;
  grid-template-rows: auto auto;
  column-gap: 28px;
  row-gap: 8px;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: 0;
  overflow: visible;
  max-width: 92vw;
  max-height: 85vh;
  z-index: 1001;
}

.gallery-grid figure.is-active.has-detail-text {
  width: min(92vw, 1080px);
  grid-template-columns: minmax(0, 1fr) minmax(240px, 340px);
}

.gallery-grid figure.is-active .gallery-media-frame {
  grid-column: 1;
  grid-row: 1;
  position: static;
  width: auto;
  height: auto;
  aspect-ratio: unset;
  max-width: 85vw;
  max-height: 75vh;
  min-width: 0;
  background: transparent;
}

.gallery-grid figure.is-active .gallery-media-frame img {
  position: static;
  width: auto;
  height: auto;
  max-width: 100%;
  max-height: 75vh;
  object-fit: contain;
  transform: none;
  display: block;
  border: 3px solid #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  cursor: zoom-out;
}

.gallery-grid figure.is-active figcaption {
  grid-column: 1;
  grid-row: 2;
  position: static;
  transform: none;
  width: auto;
  max-width: 100%;
  background: transparent;
  color: #fff;
  padding: 6px 0 0;
  z-index: auto;
  text-align: center;
  font-size: 15px;
}

.gallery-grid figure .gallery-detail-text {
  display: none;
}

.gallery-grid figure.is-active.has-detail-text .gallery-detail-text {
  display: block;
  grid-column: 2;
  grid-row: 1 / span 2;
  align-self: center;
  color: #e0e0e0;
  font-family: "Andale Mono", Menlo, monospace;
  max-height: 75vh;
  overflow-y: auto;
  padding-right: 4px;
  text-align: left;
}

.gallery-grid .gallery-detail-text .detail-text-section + .detail-text-section {
  margin-top: 18px;
}

.gallery-grid .gallery-detail-text .detail-text-heading {
  font-family: Arial, sans-serif;
  font-style: italic;
  font-size: 16px;
  font-weight: bold;
  color: #fff;
  margin: 0 0 6px;
}

.gallery-grid .gallery-detail-text .detail-text-body {
  margin: 0;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-line;
}

    .project-sidebar {
      background: linear-gradient(to bottom, #D0D6DB, #f3f5f7 28%);
      border: 1px solid rgba(37, 38, 38, 0.2);
      border-radius: 8px;
      padding: 16px;
    }

    .sidebar-block + .sidebar-block {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(37, 38, 38, 0.16);
    }

    .sidebar-title {
      font-family: Arial, sans-serif;
      font-style: italic;
      font-size: 15px;
      margin-bottom: 10px;
      color: #252626;
    }

    .sidebar-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .sidebar-item-title {
      font-size: 13px;
      line-height: 1.45;
      color: #252626;
    }

    .sidebar-item-desc {
      font-size: 12px;
      line-height: 1.45;
      color: #444c52;
      margin-top: 2px;
    }

    .sidebar-link {
      color: #263DBF;
      text-decoration: none;
      word-break: break-word;
    }

    .sidebar-link:hover {
      color: #F24C27;
      text-decoration: underline;
    }

    .status-message {
      font-family: Menlo, monospace;
      color: #e0e0e0;
      margin: 20px auto;
      width: min(1120px, calc(100% - 30px));
    }

    @media (max-width: 980px) {
      .project-layout {
        grid-template-columns: 1fr;
      }

      .project-sidebar {
        margin-top: 4px;
      }
    }

    @media (max-width: 700px) {
      .project-detail {
        padding: 18px;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .project-full-description {
        margin-top: 18px;
        font-size: 14px;
      }

      .gallery-grid figure.is-active {
        max-height: 90vh;
        max-width: 95vw;
      }

      .gallery-grid figure.is-active.has-detail-text {
        width: calc(100vw - 24px);
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        max-height: 90vh;
        max-width: calc(100vw - 24px);
        row-gap: 10px;
        overflow-y: auto;
        padding: 0 0 8px;
      }

      .gallery-grid figure.is-active .gallery-media-frame,
      .gallery-grid figure.is-active .gallery-media-frame img {
        width: 100%;
        max-width: 100%;
        height: auto;
        max-height: 50vh;
      }

      .gallery-grid figure.is-active figcaption {
        width: 100%;
        max-width: 100%;
        text-align: left;
        padding-top: 4px;
      }

      .gallery-grid figure.is-active.has-detail-text .gallery-detail-text {
        grid-column: 1;
        grid-row: 3;
        width: 100%;
        max-width: 100%;
        max-height: none;
        overflow: visible;
        text-align: left;
        padding-right: 0;
      }

      .gallery-grid .gallery-detail-text .detail-text-body {
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .gallery-grid figure {
        transition: none;
      }

      .gallery-grid figure:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="top-banner">
    <h1 class="title">■■■■■■■ ■■■■■■■■</h1>
    <nav>
      <ul>
        <li><a class="banner-element" href="index.html">ABOUT</a></li>
        <li><a class="banner-element" href="projects.html">PROJECTS</a></li>
        <li><a class="banner-element" href="music.html">MUSIC</a></li>
        <li><a class="banner-element" href="science.html">SCIENCE</a></li>
      </ul>
    </nav>
  </div>

  <hr id="hrid" />

  <div class="content">
    <div id="lightbox-backdrop" class="lightbox-backdrop"></div>
    <div id="status" class="status-message">Loading project…</div>
    <article id="project-detail" class="project-detail" style="display:none;">
      <a class="back-link" href="projects.html">← Back to projects</a>

      <div class="project-layout">
        <section class="project-main" aria-label="Project main content">
          <h2 id="project-title" class="project-title"></h2>
          <p id="project-description" class="project-full-description"></p>
          <section class="image-gallery" aria-label="Project gallery">
            <div id="gallery-grid" class="gallery-grid"></div>
          </section>
        </section>

        <aside class="project-sidebar" aria-label="Project info sidebar">
          <section id="sidebar-exhibitions" class="sidebar-block" style="display:none;">
            <h3 class="sidebar-title">PROJECTIONS / EXHIBITIONS</h3>
            <ul id="sidebar-exhibitions-list" class="sidebar-list"></ul>
          </section>

          <section id="sidebar-outreach" class="sidebar-block" style="display:none;">
            <h3 class="sidebar-title">OUTREACH</h3>
            <ul id="sidebar-outreach-list" class="sidebar-list"></ul>
          </section>

          <section id="sidebar-links" class="sidebar-block" style="display:none;">
            <h3 class="sidebar-title">LINKS</h3>
            <ul id="sidebar-links-list" class="sidebar-list"></ul>
          </section>
        </aside>
      </div>
    </article>
  </div>

  <script>
    function slugifyForLookup(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9-]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
    }

    function getProjectIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return slugifyForLookup(params.get("id"));
    }

    function getProjectIdentifier(item) {
      if (!item) return "";
      return item.id || (item.card && item.card.title) || "";
    }

    function toVimeoEmbedUrl(url) {
      if (!url) return "";
      const match = String(url).match(/vimeo\.com\/(?:manage\/videos\/)?(\d+)/i);
      if (!match || !match[1]) return "";
      return `https://player.vimeo.com/video/${match[1]}`;
    }

    function normalizeGalleryMediaPath(value) {
      return typeof value === "string" ? value.trim() : "";
    }

    function extractFilenameFromPath(normalizedPath) {
      const safePath = String(normalizedPath || "");
      const pathWithoutQuery = safePath.split(/[?#]/)[0];
      const pathSegments = pathWithoutQuery.split("/");
      return pathSegments[pathSegments.length - 1] || "";
    }

    function safeDecodeURIComponent(value) {
      try {
        return decodeURIComponent(value);
      } catch (error) {
        return value;
      }
    }

    function setTextContent(node, value) {
      node.textContent = String(value || "");
    }

    function getGalleryItemLabel(item, index) {
      if (item && typeof item.caption === "string" && item.caption.trim()) {
        return item.caption.trim();
      }

      if (item && typeof item.title === "string" && item.title.trim()) {
        return item.title.trim();
      }

      const mediaPath = normalizeGalleryMediaPath((item && (item.image || item.video)) || "");
      if (!mediaPath) return `Gallery item ${index + 1}`;

      if (item && item.video) return `Video ${index + 1}`;

      const filename = extractFilenameFromPath(mediaPath);
      const stem = filename.replace(/\.[^.]+$/, "");
      const readable = safeDecodeURIComponent(stem)
        .replace(/[_-]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
      return readable || `Image ${index + 1}`;
    }

    function getGalleryMediaAltText(projectTitle, label, index) {
      return label || `${projectTitle || "Project"} image ${index + 1}`;
    }

    function buildDetailTextSection(heading, content) {
      const trimmed = typeof content === "string" ? content.trim() : "";
      if (!trimmed) return null;

      const section = document.createElement("div");
      section.className = "detail-text-section";

      const headingEl = document.createElement("p");
      headingEl.className = "detail-text-heading";
      setTextContent(headingEl, heading);

      const bodyEl = document.createElement("p");
      bodyEl.className = "detail-text-body";
      setTextContent(bodyEl, trimmed);

      section.appendChild(headingEl);
      section.appendChild(bodyEl);
      return section;
    }

    function renderSidebarList(sectionEl, listEl, entries, fallbackAsLink = false) {
      listEl.innerHTML = "";
      const valid = Array.isArray(entries) ? entries.filter(Boolean) : [];
      if (!valid.length) {
        sectionEl.style.display = "none";
        return;
      }

      valid.forEach((entry) => {
        const li = document.createElement("li");

        const title = document.createElement("div");
        title.className = "sidebar-item-title";

        const linkTarget = entry.url || entry.link || "";
        if (linkTarget) {
          const a = document.createElement("a");
          a.className = "sidebar-link";
          a.href = linkTarget;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = entry.title || entry.name || linkTarget;
          title.appendChild(a);
        } else {
          title.textContent = entry.title || entry.name || "Untitled";
        }

        li.appendChild(title);

        if (entry.description) {
          const desc = document.createElement("div");
          desc.className = "sidebar-item-desc";
          desc.textContent = entry.description;
          li.appendChild(desc);
        } else if (fallbackAsLink && !linkTarget && entry.url) {
          const desc = document.createElement("div");
          desc.className = "sidebar-item-desc";
          desc.textContent = entry.url;
          li.appendChild(desc);
        }

        listEl.appendChild(li);
      });

      sectionEl.style.display = "block";
    }

    async function loadProject() {
      const status = document.getElementById("status");
      const container = document.getElementById("project-detail");
      const description = document.getElementById("project-description");
      const titleEl = document.getElementById("project-title");
      const galleryGrid = document.getElementById("gallery-grid");
      const gallerySection = galleryGrid.closest(".image-gallery");
      const projectMain = document.querySelector(".project-main");

      const exhibitionsSection = document.getElementById("sidebar-exhibitions");
      const outreachSection = document.getElementById("sidebar-outreach");
      const linksSection = document.getElementById("sidebar-links");
      const exhibitionsList = document.getElementById("sidebar-exhibitions-list");
      const outreachList = document.getElementById("sidebar-outreach-list");
      const linksList = document.getElementById("sidebar-links-list");

      const projectId = getProjectIdFromUrl();

      if (!projectId) {
        status.textContent = "Project not found.";
        return;
      }

      try {
        const response = await fetch("projects.json");
        if (!response.ok) throw new Error(`Unable to load projects.json (${response.status})`);

        const data = await response.json();
        const projects = Array.isArray(data.projects) ? data.projects : [];
        const project = projects.find(item => slugifyForLookup(getProjectIdentifier(item)) === projectId);

        if (!project || !project.card || !project.page) {
          status.textContent = "Project not found.";
          return;
        }

        setTextContent(titleEl, project.card.title || "");
        description.textContent = project.page.fullDescription || "";

        const galleryItems = Array.isArray(project.page.gallery) ? project.page.gallery : [];
        const hasVideo = galleryItems.some(item => item && item.video);
        if (hasVideo) {
          projectMain.insertBefore(gallerySection, description);
        } else {
          projectMain.insertBefore(description, gallerySection);
        }

        galleryGrid.replaceChildren();
        if (!galleryItems.length) {
          const emptyCaption = document.createElement("p");
          setTextContent(emptyCaption, "No gallery images yet.");
          emptyCaption.style.fontFamily = "Menlo, monospace";
          emptyCaption.style.fontSize = "14px";
          galleryGrid.appendChild(emptyCaption);
        } else {
          for (const [index, item] of galleryItems.entries()) {
            const figure = document.createElement("figure");
            const mediaFrame = document.createElement("div");
            mediaFrame.className = "gallery-media-frame";
            const caption = document.createElement("figcaption");
            const label = getGalleryItemLabel(item, index);
            setTextContent(caption, label);
            let hasMedia = false;

            if (item.video) {
              const embedUrl = toVimeoEmbedUrl(item.video);
              if (embedUrl) {
                const iframe = document.createElement("iframe");
                iframe.src = embedUrl;
                iframe.title = (project.card.title || "Project") + " video " + (index + 1);
                iframe.allow = "autoplay; fullscreen; picture-in-picture";
                iframe.allowFullscreen = true;
                mediaFrame.appendChild(iframe);
                hasMedia = true;
              }
            } else {
              const imagePath = normalizeGalleryMediaPath(item.image);
              if (imagePath) {
                const img = document.createElement("img");
                img.src = imagePath;
                img.alt = getGalleryMediaAltText(project.card.title, label, index);
                img.loading = "lazy";
                mediaFrame.appendChild(img);
                hasMedia = true;
              }
            }

            if (!hasMedia) {
              continue;
            }

            figure.appendChild(mediaFrame);
            figure.appendChild(caption);

            const generalSection = buildDetailTextSection("General description", item.general_text);
            const technicalSection = buildDetailTextSection("Technical description", item.technical_text);

            if (generalSection || technicalSection) {
              const detailText = document.createElement("div");
              detailText.className = "gallery-detail-text";
              if (generalSection) detailText.appendChild(generalSection);
              if (technicalSection) detailText.appendChild(technicalSection);
              figure.appendChild(detailText);
              figure.classList.add("has-detail-text");
            }

            galleryGrid.appendChild(figure);
          }
        }

        const sidebar = project.page.sidebar || {};
        renderSidebarList(exhibitionsSection, exhibitionsList, sidebar.exhibitions || []);
        renderSidebarList(outreachSection, outreachList, sidebar.outreach || []);
        renderSidebarList(linksSection, linksList, sidebar.links || [], true);

        document.title = `${project.card.title || "Project"} | Projects`;
        status.style.display = "none";
        container.style.display = "block";
      } catch (error) {
        status.textContent = "Could not load project content.";
        console.error(error);
      }
    }

    loadProject();

    const galleryGridEl = document.getElementById("gallery-grid");
    const lightboxBackdrop = document.getElementById("lightbox-backdrop");
    
    function closeActiveFigure() {
      galleryGridEl.querySelectorAll('figure.is-active').forEach(f => {
        f.classList.remove('is-active');
      });
      lightboxBackdrop.classList.remove('is-active');
    }
    
    galleryGridEl.addEventListener('click', (e) => {
      const figure = e.target.closest('figure');
      if (!figure || !galleryGridEl.contains(figure)) return;
    
      const wasActive = figure.classList.contains('is-active');
      closeActiveFigure();
    
      if (!wasActive) {
        figure.classList.add('is-active');
        lightboxBackdrop.classList.add('is-active');
      }
    
      e.stopPropagation();
    });
    
    // click the backdrop (or anywhere outside) closes it
    lightboxBackdrop.addEventListener('click', closeActiveFigure);
    document.addEventListener('click', closeActiveFigure);
  </script>
</body>
</html>
