<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Detail</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="images/me.webp" sizes="48x48" />
  <style>
    body {
      background: #252626;
    }

    .content {
      background: linear-gradient(to bottom, #263DBF, #252626 14%);
      min-height: calc(100vh - 80px);
      align-items: flex-start;
    }

    .project-detail {
      width: min(1120px, 100%);
      margin: 0 auto;
      background: linear-gradient(to bottom, #F24C27, #e0e0e0 2%);
      border-radius: 10px;
      padding: 28px;
      color: #252626;
      font-family: "Andale Mono", Menlo, monospace;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #263DBF;
      text-decoration: none;
      font-weight: bold;
      font-style: italic;
      font-family: Arial, sans-serif;
    }

    .back-link:hover {
      color: #F24C27;
      text-decoration: underline;
    }

    .project-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.75fr) minmax(260px, 0.95fr);
      gap: 24px;
      align-items: start;
    }

    .project-main {
      min-width: 0;
    }

    .project-full-description {
      font-size: 15px;
      line-height: 1.7;
      margin-top: 24px;
      margin-bottom: 0;
      white-space: pre-line;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .gallery-grid figure {
      margin: 0;
      background: #d0d6db;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(37, 38, 38, 0.2);
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
      transform-origin: center;
      isolation: isolate;
    }

    .gallery-grid figure:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
      background: #e0e0e0;
      z-index: 1;
    }

    .gallery-grid .gallery-media-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
    }

    .gallery-grid img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .gallery-grid .gallery-media-frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .gallery-grid figcaption {
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      color: #252626;
      font-family: Arial, sans-serif;
      font-style: italic;
      font-weight: 600;
    }

    .project-sidebar {
      background: linear-gradient(to bottom, #D0D6DB, #f3f5f7 28%);
      border: 1px solid rgba(37, 38, 38, 0.2);
      border-radius: 8px;
      padding: 16px;
    }

    .sidebar-block + .sidebar-block {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(37, 38, 38, 0.16);
    }

    .sidebar-title {
      font-family: Arial, sans-serif;
      font-style: italic;
      font-size: 15px;
      margin-bottom: 10px;
      color: #252626;
    }

    .sidebar-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .sidebar-item-title {
      font-size: 13px;
      line-height: 1.45;
      color: #252626;
    }

    .sidebar-item-desc {
      font-size: 12px;
      line-height: 1.45;
      color: #444c52;
      margin-top: 2px;
    }

    .sidebar-link {
      color: #263DBF;
      text-decoration: none;
      word-break: break-word;
    }

    .sidebar-link:hover {
      color: #F24C27;
      text-decoration: underline;
    }

    .status-message {
      font-family: Menlo, monospace;
      color: #e0e0e0;
      margin: 20px auto;
      width: min(1120px, calc(100% - 30px));
    }

    @media (max-width: 980px) {
      .project-layout {
        grid-template-columns: 1fr;
      }

      .project-sidebar {
        margin-top: 4px;
      }
    }

    @media (max-width: 700px) {
      .project-detail {
        padding: 18px;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .project-full-description {
        margin-top: 18px;
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .gallery-grid figure {
        transition: none;
      }

      .gallery-grid figure:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="top-banner">
    <h1 class="title">■■■■■■■ ■■■■■■■■</h1>
    <nav>
      <ul>
        <li><a class="banner-element" href="index.html">ABOUT</a></li>
        <li><a class="banner-element" href="projects.html">PROJECTS</a></li>
        <li><a class="banner-element" href="music.html">MUSIC</a></li>
        <li><a class="banner-element" href="science.html">SCIENCE</a></li>
      </ul>
    </nav>
  </div>

  <hr id="hrid" />

  <div class="content">
    <div id="status" class="status-message">Loading project…</div>
    <article id="project-detail" class="project-detail" style="display:none;">
      <a class="back-link" href="projects.html">← Back to projects</a>

      <div class="project-layout">
        <section class="project-main" aria-label="Project main content">
          <section class="image-gallery" aria-label="Project gallery">
            <div id="gallery-grid" class="gallery-grid"></div>
          </section>
          <p id="project-description" class="project-full-description"></p>
        </section>

        <aside class="project-sidebar" aria-label="Project info sidebar">
          <section id="sidebar-exhibitions" class="sidebar-block" style="display:none;">
            <h3 class="sidebar-title">EXHIBITIONS</h3>
            <ul id="sidebar-exhibitions-list" class="sidebar-list"></ul>
          </section>

          <section id="sidebar-outreach" class="sidebar-block" style="display:none;">
            <h3 class="sidebar-title">OUTREACH</h3>
            <ul id="sidebar-outreach-list" class="sidebar-list"></ul>
          </section>

          <section id="sidebar-links" class="sidebar-block" style="display:none;">
            <h3 class="sidebar-title">LINKS</h3>
            <ul id="sidebar-links-list" class="sidebar-list"></ul>
          </section>
        </aside>
      </div>
    </article>
  </div>

  <script>
    function slugifyForLookup(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9-]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
    }

    function getProjectIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return slugifyForLookup(params.get("id"));
    }

    function getProjectIdentifier(item) {
      if (!item) return "";
      return item.id || (item.card && item.card.title) || "";
    }

    function toVimeoEmbedUrl(url) {
      if (!url) return "";
      const match = String(url).match(/vimeo\.com\/(?:manage\/videos\/)?(\d+)/i);
      if (!match || !match[1]) return "";
      return `https://player.vimeo.com/video/${match[1]}`;
    }

    function normalizeGalleryMediaPath(value) {
      return typeof value === "string" ? value.trim() : "";
    }

    function isSupportedGalleryImage(path) {
      const normalized = normalizeGalleryMediaPath(path);
      if (!normalized) return false;
      return /(?:\.)(avif|gif|jpe?g|png|svg|webp)(?:[?#].*)?$/i.test(normalized)
        || !/\.[a-z0-9]+(?:[?#].*)?$/i.test(normalized);
    }

    function getGalleryItemLabel(item, index) {
      if (item && typeof item.caption === "string" && item.caption.trim()) {
        return item.caption.trim();
      }

      if (item && typeof item.title === "string" && item.title.trim()) {
        return item.title.trim();
      }

      const mediaPath = normalizeGalleryMediaPath((item && (item.image || item.video)) || "");
      if (!mediaPath) return `Gallery item ${index + 1}`;

      if (item && item.video) return `Video ${index + 1}`;

      const filename = mediaPath.split(/[?#]/)[0].split("/").pop() || "";
      const stem = filename.replace(/\.[^.]+$/, "");
      const readable = decodeURIComponent(stem).replace(/[_-]+/g, " ").trim();
      return readable || `Image ${index + 1}`;
    }

    function renderSidebarList(sectionEl, listEl, entries, fallbackAsLink = false) {
      listEl.innerHTML = "";
      const valid = Array.isArray(entries) ? entries.filter(Boolean) : [];
      if (!valid.length) {
        sectionEl.style.display = "none";
        return;
      }

      valid.forEach((entry) => {
        const li = document.createElement("li");

        const title = document.createElement("div");
        title.className = "sidebar-item-title";

        const linkTarget = entry.url || entry.link || "";
        if (linkTarget) {
          const a = document.createElement("a");
          a.className = "sidebar-link";
          a.href = linkTarget;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = entry.title || entry.name || linkTarget;
          title.appendChild(a);
        } else {
          title.textContent = entry.title || entry.name || "Untitled";
        }

        li.appendChild(title);

        if (entry.description) {
          const desc = document.createElement("div");
          desc.className = "sidebar-item-desc";
          desc.textContent = entry.description;
          li.appendChild(desc);
        } else if (fallbackAsLink && !linkTarget && entry.url) {
          const desc = document.createElement("div");
          desc.className = "sidebar-item-desc";
          desc.textContent = entry.url;
          li.appendChild(desc);
        }

        listEl.appendChild(li);
      });

      sectionEl.style.display = "block";
    }

    async function loadProject() {
      const status = document.getElementById("status");
      const container = document.getElementById("project-detail");
      const description = document.getElementById("project-description");
      const galleryGrid = document.getElementById("gallery-grid");

      const exhibitionsSection = document.getElementById("sidebar-exhibitions");
      const outreachSection = document.getElementById("sidebar-outreach");
      const linksSection = document.getElementById("sidebar-links");
      const exhibitionsList = document.getElementById("sidebar-exhibitions-list");
      const outreachList = document.getElementById("sidebar-outreach-list");
      const linksList = document.getElementById("sidebar-links-list");

      const projectId = getProjectIdFromUrl();

      if (!projectId) {
        status.textContent = "Project not found.";
        return;
      }

      try {
        const response = await fetch("projects.json");
        if (!response.ok) throw new Error(`Unable to load projects.json (${response.status})`);

        const data = await response.json();
        const projects = Array.isArray(data.projects) ? data.projects : [];
        const project = projects.find(item => slugifyForLookup(getProjectIdentifier(item)) === projectId);

        if (!project || !project.card || !project.page) {
          status.textContent = "Project not found.";
          return;
        }

        description.textContent = project.page.fullDescription || "";

        const galleryItems = Array.isArray(project.page.gallery) ? project.page.gallery : [];
        galleryGrid.innerHTML = "";
        if (!galleryItems.length) {
          const emptyCaption = document.createElement("p");
          emptyCaption.textContent = "No gallery images yet.";
          emptyCaption.style.fontFamily = "Menlo, monospace";
          emptyCaption.style.fontSize = "14px";
          galleryGrid.appendChild(emptyCaption);
        } else {
          galleryItems.forEach((item, index) => {
            const figure = document.createElement("figure");
            const mediaFrame = document.createElement("div");
            mediaFrame.className = "gallery-media-frame";
            const caption = document.createElement("figcaption");
            caption.textContent = getGalleryItemLabel(item, index);
            let hasMedia = false;

            if (item.video) {
              const embedUrl = toVimeoEmbedUrl(item.video);
              if (embedUrl) {
                const iframe = document.createElement("iframe");
                iframe.src = embedUrl;
                iframe.title = (project.card.title || "Project") + " video " + (index + 1);
                iframe.allow = "autoplay; fullscreen; picture-in-picture";
                iframe.allowFullscreen = true;
                mediaFrame.appendChild(iframe);
                hasMedia = true;
              }
            } else {
              const imagePath = normalizeGalleryMediaPath(item.image);
              if (isSupportedGalleryImage(imagePath)) {
                const img = document.createElement("img");
                img.src = imagePath;
                img.alt = caption.textContent || ((project.card.title || "Project") + " image " + (index + 1));
                img.loading = "lazy";
                mediaFrame.appendChild(img);
                hasMedia = true;
              }
            }

            if (!hasMedia) {
              return;
            }

            figure.appendChild(mediaFrame);
            figure.appendChild(caption);
            galleryGrid.appendChild(figure);
          });
        }

        const sidebar = project.page.sidebar || {};
        renderSidebarList(exhibitionsSection, exhibitionsList, sidebar.exhibitions || []);
        renderSidebarList(outreachSection, outreachList, sidebar.outreach || []);
        renderSidebarList(linksSection, linksList, sidebar.links || [], true);

        document.title = `${project.card.title || "Project"} | Projects`;
        status.style.display = "none";
        container.style.display = "block";
      } catch (error) {
        status.textContent = "Could not load project content.";
        console.error(error);
      }
    }

    loadProject();
  </script>
</body>
</html>
