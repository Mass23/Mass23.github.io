<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #263DBF 25%, #252626 100%);
    }
    svg {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .node rect {
  fill: #e0e0e0;
  stroke: #333;
  rx: 8;
  ry: 8;
  cursor: grab;
}

.node text {
  pointer-events: none;
  font-family: Menlo, monospace;
  font-size: 28px;
  fill: black;
}

.link {
  stroke: #F24C27;
  stroke-opacity: 0.6;
  stroke-width: 4;
}

.highlighted-node rect {
  fill: #333;
}

.highlighted-node text {
  fill: white;
}

.highlighted-link {
  stroke: #333;
  stroke-opacity: 1;
  stroke-width: 5;
}

.project-preview {
  position: fixed;
  display: none;
  max-width: 280px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #e0e0e0;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
  font-family: Menlo, monospace;
  color: #111;
  pointer-events: none;
  z-index: 20;
}

.project-preview-image {
  display: none;
  width: 100%;
  height: auto;
  border-radius: 6px;
  margin-bottom: 8px;
}

.project-preview-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 6px;
}

.project-preview-keywords {
  font-size: 12px;
  line-height: 1.4;
}
  </style>
</head>
<body>
<svg></svg>
<script>
const svg = d3.select("svg");
let width = window.innerWidth;
let height = window.innerHeight;

// === Data ===
const projectNodes = [
  {
    id: "Programmatic-artworks",
    url: "https://mass23.github.io/p_programmatic-artworks.html",
    keywords: ["code", "visuals", "generative", "videos", "manifesto"],
    previewImage: "images/programmatic-preview.jpg"
  },
  {
    id: "Brodinsky-sur-Boue",
    url: "https://brodinskysurboue.ch/",
    keywords: ["bw", "installation", "performance", "videos", "music"],
    previewImage: "images/brodinsky-preview.jpg"
  },
  {
    id: "Bridging-the-gap-with-myself",
    url: "https://mass23.github.io/p_programmatic-artworks.html",
    keywords: ["code", "visuals", "installation", "videos", "music"],
    previewImage: "images/bridging-preview.jpg"
  },
  {
    id: "The-always-series",
    url: "https://mass23.github.io/p_the-always-series.html",
    keywords: ["data", "ethical", "generative", "videos", "music"],
    previewImage: "images/programmatic-artworks.jpg"
  },
  {
    id: "Childhood-paradise-reenacted",
    url: "https://mass23.github.io/p_programmatic-artworks.html",
    keywords: ["mountain", "visuals", "generative", "videos", "ethical"],
    previewImage: "images/programmatic-artworks.jpg"
  },
  {
    id: "A-glitch-in-the-ethics",
    url: "https://mass23.github.io/p_programmatic-artworks.html",
    keywords: ["glitch", "visuals", "bw", "code", "ethical"],
    previewImage: "images/programmatic-artworks.jpg"
  }
];

const homeNode = {
  id: "🏠 ABOUT",
  keywords: [],
  fixed: true,
  fx: 100,
  fy: 50,
  url: "https://mass23.github.io/",
  isHome: true
};

const nodes = [...projectNodes, homeNode];

function sharedKeywords(firstKeywords, secondKeywords) {
  const secondSet = new Set(secondKeywords);
  return firstKeywords.filter(keyword => secondSet.has(keyword));
}

const links = [];
for (let i = 0; i < projectNodes.length; i += 1) {
  for (let j = i + 1; j < projectNodes.length; j += 1) {
    const overlap = sharedKeywords(projectNodes[i].keywords, projectNodes[j].keywords);
    if (overlap.length >= 2) {
      links.push({
        source: projectNodes[i].id,
        target: projectNodes[j].id,
        sharedCount: overlap.length,
        sharedKeywords: overlap
      });
    }
  }
}

const preview = d3.select("body")
  .append("div")
  .attr("class", "project-preview");

const previewImage = preview.append("img").attr("class", "project-preview-image");
const previewTitle = preview.append("div").attr("class", "project-preview-title");
const previewKeywords = preview.append("div").attr("class", "project-preview-keywords");
let pendingPreviewImage = null;

// === Force Simulation ===
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(400))
  .force("charge", d3.forceManyBody().strength(-600))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .on("tick", ticked);

// === Draw Links ===
const link = svg.append("g")
  .selectAll("line")
  .data(links)
  .join("line")
  .attr("class", "link");

// === Draw Nodes ===
const node = svg.append("g")
  .selectAll("g")
  .data(nodes)
  .join("g")
  .attr("class", "node")
  .call(drag(simulation))
  .on("click", (event, d) => {
    if (d.url) window.open(d.url, "_blank");
  })
  .on("mouseover", (event, d) => {
    highlightClusters(d.id);
    showPreview(event, d);
  })
  .on("mousemove", (event, d) => movePreview(event, d))
  .on("mouseout", () => {
    clearHighlight();
    hidePreview();
  });


node.append("text")
  .text(d => d.id)
  .attr("text-anchor", "middle")
  .attr("dy", "0.35em")
  .each(function(d) {
    const bbox = this.getBBox();
    d.textWidth = bbox.width;
    d.textHeight = bbox.height;
  });

node.insert("rect", "text")
  .attr("x", d => -d.textWidth / 2 - 20)
  .attr("y", d => -d.textHeight / 2 - 8)
  .attr("width", d => d.textWidth + 40)
  .attr("height", d => d.textHeight + 16);

// === Cluster Layer ===
function highlightClusters(nodeId) {
  // Only highlight the hovered node and its connections
  node.classed("highlighted-node", d => d.id === nodeId);
  link.classed("highlighted-link", d => d.source.id === nodeId || d.target.id === nodeId);
}

function clearHighlight() {
  node.classed("highlighted-node", false);
  link.classed("highlighted-link", false);
}

function ticked() {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
}

function showPreview(event, nodeData) {
  if (nodeData.isHome) return;
  previewTitle.text(nodeData.id);
  previewKeywords.text(nodeData.keywords.join(" • "));
  preview.style("display", "block");

  previewImage.style("display", "none").attr("src", null);
  if (pendingPreviewImage) {
    pendingPreviewImage.onload = null;
    pendingPreviewImage.onerror = null;
  }

  if (nodeData.previewImage) {
    const imageProbe = new Image();
    pendingPreviewImage = imageProbe;
    imageProbe.onload = () => {
      if (pendingPreviewImage !== imageProbe) return;
      previewImage.attr("src", nodeData.previewImage).style("display", "block");
    };
    imageProbe.onerror = () => {
      if (pendingPreviewImage !== imageProbe) return;
      previewImage.style("display", "none").attr("src", null);
    };
    imageProbe.src = nodeData.previewImage;
  }

  movePreview(event, nodeData);
}

function movePreview(event, nodeData) {
  if (nodeData.isHome || preview.style("display") === "none") return;
  const offset = 16;
  let left = event.clientX + offset;
  let top = event.clientY + offset;
  const previewRect = preview.node().getBoundingClientRect();

  if (left + previewRect.width > window.innerWidth - 8) {
    left = event.clientX - previewRect.width - offset;
  }

  if (top + previewRect.height > window.innerHeight - 8) {
    top = event.clientY - previewRect.height - offset;
  }

  preview
    .style("left", `${Math.max(8, left)}px`)
    .style("top", `${Math.max(8, top)}px`);
}

function hidePreview() {
  preview.style("display", "none");
}

function drag(simulation) {
  return d3.drag()
    .on("start", (event, d) => {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    })
    .on("drag", (event, d) => {
      d.fx = event.x;
      d.fy = event.y;
    })
    .on("end", (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = event.x;
      d.fy = event.y;
    });
}

window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  simulation.force("center", d3.forceCenter(width / 2, height / 2));
  simulation.alpha(0.5).restart();
});
</script>
</body>
</html>
